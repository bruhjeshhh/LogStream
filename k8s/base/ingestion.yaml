apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion
  namespace: logstream
spec:
  replicas: 1
  selector:
    matchLabels: {app: ingestion}
  template:
    metadata:
      labels: {app: ingestion}
    spec:
      containers:
        - name: ingestion
          image: logstream-ingestion:latest
          imagePullPolicy: IfNotPresent
          ports: [{containerPort: 8080}]
          envFrom: [{configMapRef: {name: logstream-config}}]
          readinessProbe: {httpGet: {path: /api/healthz, port: 8080}, initialDelaySeconds: 3}
          livenessProbe: {httpGet: {path: /api/healthz, port: 8080}, initialDelaySeconds: 10}
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits: {cpu: 500m, memory: 256Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion
  namespace: logstream
spec:
  selector: {app: ingestion}
  ports: [{port: 8080, targetPort: 8080}]
