services:
  kafka:
    image: bitnamilegacy/kafka:latest
    container_name: kafka

    ports:
      - "9092:9092"

    environment:
      # KRaft mode
      - KAFKA_ENABLE_KRAFT=yes

      # Node identity
      - KAFKA_CFG_NODE_ID=1

      # Roles
      - KAFKA_CFG_PROCESS_ROLES=broker,controller

      # Controller quorum
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093

      # Listeners
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093

      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092

      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER

      # Auto-create the input and dead-letter topics for local development.
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true

      # Allow plaintext (development only)
      - ALLOW_PLAINTEXT_LISTENER=yes

    volumes:
      - kafka_data:/bitnami/kafka

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.18.2
    container_name: logstream-es

    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g

    ports:
      - "9200:9200"

    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data

    restart: unless-stopped

  postgres:
    image: postgres:17
    container_name: logstream-postgres

    environment:
      POSTGRES_USER: logstream
      POSTGRES_PASSWORD: logstream
      POSTGRES_DB: logstream

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    restart: unless-stopped

volumes:
  kafka_data:
  elasticsearch-data:
  postgres-data:



